<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #84042a; /* Cor para alterar no modo noturno */
            color: #ff78a0;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: rgb(121, 1, 33); /* Cor para alterar no modo noturno */
            padding: 30px;
            border: solid 6px #91012c;
            border-radius: 110px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #eed9e0;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #961139;
            padding: 15px;
            border-radius: 100px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            font-weight: 600;
            color: rgb(213, 215, 213);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Dashboard Analítico</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">94.2%</span>
                <span class="card-label">Acurácia</span>
            </div>
            <div class="card">
                <span class="card-value">1.2s</span>
                <span class="card-label">Latência</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #fe9f9f;">
            Status do Servidor: <span style="color: rgb(217, 229, 212);">● Online</span>
        </p>
    </div>

</body>
</html>
